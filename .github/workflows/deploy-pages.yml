name: Thailand Flug-Tracker Dashboard (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'data/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-thailand-flug-tracker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Dashboard-Artefakt vorbereiten
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r data _site/

      - name: Dashboard hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
